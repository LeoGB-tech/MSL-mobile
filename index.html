<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MSL">
<meta name="theme-color" content="#0a0c10">
<title>MSL</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ THEMES ═══ */
:root {
    --bg:#0a0c10; --bg2:#111318; --bg3:#181c24;
    --border:#1e2430; --border2:#252d3d;
    --accent:#4f8ef7; --accent2:#3a6fd8;
    --gold:#c9a84c; --red:#c0392b; --green:#27ae60;
    --text:#e8eaf0; --text2:#8a93a8; --text3:#4a5568;
    --card:#13161d; --radius:12px;
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
}
body[data-theme="default"]  { --bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--text:#e8eaf0;--text2:#8a93a8; }
body[data-theme="midnight"] { --bg:#050714;--bg2:#080c1a;--bg3:#0d1228;--text:#dde2f8;--text2:#7880aa; }
body[data-theme="forest"]   { --bg:#060e08;--bg2:#0a150c;--bg3:#0f1e12;--text:#d4ecd8;--text2:#6a9a72; }
body[data-theme="ocean"]    { --bg:#03080f;--bg2:#060f1a;--bg3:#091624;--text:#d0e8f8;--text2:#5090b8; }
body[data-theme="amethyst"] { --bg:#0a0514;--bg2:#110a1e;--bg3:#160f28;--text:#e8d8f8;--text2:#9060c8; }
body[data-theme="blood"]    { --bg:#0f0505;--bg2:#160808;--bg3:#1e0c0c;--text:#f0d8d8;--text2:#a06060; }
body[data-theme="light"]    { --bg:#f0f2f7;--bg2:#e4e8f0;--bg3:#d8dce8;--border:#c8cdd8;--border2:#b0b8cc;--text:#1a1d26;--text2:#4a5270;--text3:#8090a8;--card:#e8ecf4; }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(–bg);color:var(–text);font-family:‘Inter’,sans-serif;}

/* ── SETUP SCREEN ─────────────────────────────────────── */
#setup{position:fixed;inset:0;background:var(–bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.setup-logo{font-family:‘Rajdhani’,sans-serif;font-size:52px;font-weight:700;letter-spacing:6px;background:linear-gradient(135deg,var(–accent),#7eb3ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.setup-sub{color:var(–text2);font-size:14px;margin-bottom:40px;}
.setup-card{background:var(–bg3);border:1px solid var(–border2);border-radius:20px;padding:28px;width:100%;max-width:380px;}
.setup-card h2{font-family:‘Rajdhani’,sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;}
.setup-desc{font-size:13px;color:var(–text2);margin-bottom:20px;line-height:1.6;}
.setup-field{margin-bottom:14px;}
.setup-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–text2);margin-bottom:6px;}
.setup-field input{width:100%;padding:12px 14px;background:var(–bg2);border:1px solid var(–border2);border-radius:10px;color:var(–text);font-size:15px;outline:none;}
.setup-field input:focus{border-color:var(–accent);}
.setup-field input::placeholder{color:var(–text3);}
.setup-btn{width:100%;padding:14px;background:var(–accent);color:white;border:none;border-radius:10px;font-family:‘Rajdhani’,sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:4px;}
.setup-error{font-size:13px;color:var(–red);margin-top:10px;min-height:18px;text-align:center;}

/* ── APP SHELL ───────────────────────────────────────── */
#app{display:none;height:100%;display:none;flex-direction:column;}
#app.ready{display:flex;}

/* ── TOPBAR ──────────────────────────────────────────── */
.topbar{padding:calc(var(–safe-top) + 10px) 16px 10px;background:var(–bg2);border-bottom:1px solid var(–border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-logo{font-family:‘Rajdhani’,sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(–text),var(–gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:8px;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(–accent),#7eb3ff);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0;}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(–green);box-shadow:0 0 4px var(–green);}

/* ── CONTENT ─────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(–safe-bot) + 70px);}
.view{display:none;padding:16px;}
.view.active{display:block;}

/* ── BOTTOM NAV ──────────────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:8px 0 calc(var(–safe-bot) + 4px);background:var(–bg2);border-top:1px solid var(–border);display:flex;justify-content:space-around;z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;cursor:pointer;border:none;background:none;color:var(–text3);font-size:10px;font-family:‘Inter’,sans-serif;transition:color 0.15s;}
.nav-btn .nb-icon{font-size:22px;}
.nav-btn.active{color:var(–accent);}

/* ── CARDS ───────────────────────────────────────────── */
.page-title{font-family:‘Rajdhani’,sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(–text2);margin-bottom:16px;}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.game-card{background:var(–card);border:1px solid var(–border);border-radius:var(–radius);overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.game-card:active{transform:scale(0.97);}
.game-card img{width:100%;aspect-ratio:460/215;object-fit:cover;background:var(–bg3);display:block;}
.game-card-body{padding:8px 10px;}
.game-card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.game-card-meta{font-size:10px;color:var(–text2);margin-top:2px;}
.badge{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(79,142,247,0.12);color:var(–accent);font-weight:600;display:inline-block;margin-top:3px;}
.badge.pegi{background:rgba(201,168,76,0.12);color:var(–gold);}

/* ── SEARCH ──────────────────────────────────────────── */
.search-bar{display:flex;gap:8px;margin-bottom:14px;}
.search-bar input{flex:1;padding:10px 14px;background:var(–bg3);border:1px solid var(–border2);border-radius:20px;color:var(–text);font-size:14px;outline:none;}
.search-bar input::placeholder{color:var(–text3);}

/* ── GAME MODAL ──────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.active{display:flex;}
.modal-sheet{background:var(–bg3);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(var(–safe-bot)+16px);}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(–border2);margin:12px auto 0;}
.modal-img{width:100%;aspect-ratio:460/215;object-fit:cover;background:var(–bg2);}
.modal-body{padding:16px;}
.modal-title{font-family:‘Rajdhani’,sans-serif;font-size:22px;font-weight:700;margin-bottom:10px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.modal-field label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(–text2);display:block;margin-bottom:2px;}
.modal-field span{font-size:13px;font-weight:500;}
.modal-desc{font-size:13px;color:var(–text2);line-height:1.6;margin-bottom:16px;}
.modal-btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-family:‘Rajdhani’,sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.modal-btn.primary{background:var(–accent);color:white;}
.modal-btn.secondary{background:var(–bg2);color:var(–text);border:1px solid var(–border2);}

/* ── CHAT ─────────────────────────────────────────────── */
.chat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(–border);}
.chat-messages{display:flex;flex-direction:column;gap:8px;min-height:200px;}
.chat-msg{display:flex;gap:8px;align-items:flex-start;}
.chat-msg.me{flex-direction:row-reverse;}
.chat-bubble{max-width:75%;padding:9px 12px;border-radius:14px;font-size:14px;line-height:1.5;background:var(–bg3);border:1px solid var(–border2);}
.chat-msg.me .chat-bubble{background:rgba(79,142,247,0.15);border-color:var(–accent);}
.chat-author{font-size:10px;color:var(–text2);margin-bottom:2px;font-weight:600;}
.chat-time{font-size:9px;color:var(–text3);margin-top:2px;}
.chat-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(–accent),#7eb3ff);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0;}
.chat-input-row{position:sticky;bottom:0;display:flex;gap:8px;padding:10px 0 0;background:var(–bg);}
.chat-input-row input{flex:1;padding:11px 14px;background:var(–bg3);border:1px solid var(–border2);border-radius:20px;color:var(–text);font-size:14px;outline:none;}
.chat-send{padding:11px 18px;background:var(–accent);color:white;border:none;border-radius:20px;font-family:‘Rajdhani’,sans-serif;font-weight:700;font-size:14px;cursor:pointer;}

/* ── SETTINGS ─────────────────────────────────────────── */
.set-section{background:var(–bg3);border:1px solid var(–border2);border-radius:14px;padding:16px;margin-bottom:12px;}
.set-section h3{font-family:‘Rajdhani’,sans-serif;font-size:15px;font-weight:700;margin-bottom:12px;color:var(–text2);}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(–border);font-size:14px;}
.set-row:last-child{border-bottom:none;}
.set-row label{color:var(–text2);font-size:13px;}
.set-row select,.set-row input{background:var(–bg2);border:1px solid var(–border2);border-radius:8px;color:var(–text);padding:6px 10px;font-size:13px;outline:none;}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.theme-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px;border-radius:10px;border:2px solid transparent;}
.theme-btn.active{border-color:var(–accent);}
.theme-swatch{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);}
.theme-label{font-size:9px;color:var(–text2);font-weight:600;text-transform:uppercase;}
.danger-btn{display:block;width:100%;padding:12px;background:var(–red);color:white;border:none;border-radius:10px;font-family:‘Rajdhani’,sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}

/* ── TOAST ─────────────────────────────────────────────── */
#toast{position:fixed;top:calc(var(–safe-top)+10px);left:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast-item{background:var(–bg3);border:1px solid var(–border2);border-radius:10px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:slideDown 0.3s ease;}
.toast-item.success{border-color:var(–green);}
.toast-item.error{border-color:var(–red);}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}

/* ── EMPTY ─────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 16px;color:var(–text2);}
.empty .ico{font-size:44px;margin-bottom:12px;}

/* ── STARS ─────────────────────────────────────────────── */
.stars{display:flex;gap:4px;margin:10px 0;}
.star{font-size:26px;cursor:pointer;color:var(–text3);}
.star.active{color:var(–gold);}

/* ── FIELD ─────────────────────────────────────────────── */
.field-group{margin-bottom:12px;}
.field-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–text2);margin-bottom:5px;}
.field-group input,.field-group textarea{width:100%;padding:11px 14px;background:var(–bg2);border:1px solid var(–border2);border-radius:10px;color:var(–text);font-size:14px;outline:none;font-family:‘Inter’,sans-serif;}
.field-group input:focus,.field-group textarea:focus{border-color:var(–accent);}
.field-group input::placeholder,.field-group textarea::placeholder{color:var(–text3);}

/* ── MISC ──────────────────────────────────────────────── */
.sep{border:none;border-top:1px solid var(–border);margin:12px 0;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.pill.online{background:rgba(39,174,96,0.15);color:var(–green);}
</style>

</head>

<script>
// ═══════════════════════════════════════════════════════
//  MSL PWA — Script principal
// ═══════════════════════════════════════════════════════
// ── CONFIG ────────────────────────────────────────────
// URL du serveur Railway — mise à jour automatiquement après déploiement
const RAILWAY_URL = 'https://msl-server-production.up.railway.app';
let SERVER_URL = localStorage.getItem('msl_server_url') || RAILWAY_URL;

// ── API ───────────────────────────────────────────────
const api = {
    get: async (path) => {
        const r = await fetch(SERVER_URL + path);
        return r.json();
    },
    post: async (path, data) => {
        const r = await fetch(SERVER_URL + path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return r.json();
    }
};

let db = null, currentUser = null, authMode = 'login';
let currentGameId = null, selectedStar = 0, chatInterval = null;
let cachedMsgs = {};

const THEMES = [
    {key:'default',label:'Obsidian',bg:'linear-gradient(135deg,#0a0c10,#252d3d)'},
    {key:'midnight',label:'Minuit',bg:'linear-gradient(135deg,#050714,#1a2038)'},
    {key:'forest',label:'Forêt',bg:'linear-gradient(135deg,#060e08,#1a2a20)'},
    {key:'ocean',label:'Océan',bg:'linear-gradient(135deg,#03080f,#122840)'},
    {key:'amethyst',label:'Améthyste',bg:'linear-gradient(135deg,#0a0514,#281440)'},
    {key:'blood',label:'Grenat',bg:'linear-gradient(135deg,#0f0505,#381414)'},
    {key:'light',label:'Clair',bg:'linear-gradient(135deg,#f0f2f7,#d8dce8)'},
];

const FLAGS = {France:'🇫🇷',USA:'🇺🇸',UK:'🇬🇧',Canada:'🇨🇦',Allemagne:'🇩🇪',Espagne:'🇪🇸',Italie:'🇮🇹',Belgique:'🇧🇪',Suisse:'🇨🇭',Japon:'🇯🇵',Australie:'🇦🇺',Brésil:'🇧🇷'};

const BAD = ['pute','salope','connard','fdp','nique','ntm','enculé','raciste','negro','pédé','nazi','heil','nigger','faggot','bitch','fuck you'];
function hasBad(t){ return BAD.some(w=>t.toLowerCase().includes(w)); }

// ── TOAST ─────────────────────────────────────────────
function toast(msg, type='success') {
    const el = document.createElement('div');
    el.className = `toast-item ${type}`;
    el.innerHTML = `<span>${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
    document.getElementById('toast').appendChild(el);
    setTimeout(()=>el.remove(), 3000);
}

// ── FORGOT PASSWORD ───────────────────────────────────
let resetEmail = '', resetCode = '';
function openForgot() {
    document.getElementById('forgot-overlay').style.display = 'flex';
    document.getElementById('forgot-step1').style.display = 'block';
    document.getElementById('forgot-step2').style.display = 'none';
    document.getElementById('forgot-step3').style.display = 'none';
    document.getElementById('forgot-error').innerText = '';
}
function closeForgot() { document.getElementById('forgot-overlay').style.display = 'none'; }

async function sendResetCode() {
    const email = document.getElementById('forgot-email').value.trim();
    if (!email) { document.getElementById('forgot-error').innerText = 'Email requis.'; return; }
    resetEmail = email;
    document.getElementById('forgot-error').innerText = 'Envoi...';
    const res = await api.post('/reset-code', { email });
    if (!res.success) { document.getElementById('forgot-error').innerText = res.msg || 'Erreur.'; return; }
    document.getElementById('forgot-email-display').innerText = email;
    document.getElementById('forgot-step1').style.display = 'none';
    document.getElementById('forgot-step2').style.display = 'block';
    document.getElementById('forgot-error').innerText = '';
    if (res.devMode && res.code) {
        ['c0','c1','c2','c3'].forEach((id,i) => { document.getElementById(id).value = res.code[i]||''; });
        toast('Code pré-rempli (mode dev)');
    } else {
        toast('Code envoyé à ' + email);
    }
}
function codeInput(idx) {
    const val = document.getElementById('c'+idx).value;
    if (val && idx < 3) document.getElementById('c'+(idx+1)).focus();
}
async function verifyCode() {
    const code = ['c0','c1','c2','c3'].map(id=>document.getElementById(id).value).join('');
    if (code.length !== 4) { document.getElementById('forgot-error').innerText = 'Entrez les 4 chiffres.'; return; }
    resetCode = code;
    const res = await api.post('/verify-code', { email: resetEmail, code });
    if (!res.success) { document.getElementById('forgot-error').innerText = res.msg; return; }
    document.getElementById('forgot-step2').style.display = 'none';
    document.getElementById('forgot-step3').style.display = 'block';
    document.getElementById('forgot-error').innerText = '';
}
async function saveNewPassword() {
    const np = document.getElementById('new-pw-reset').value.trim();
    const nc = document.getElementById('new-pw-confirm').value.trim();
    if (!np) { document.getElementById('forgot-error').innerText = 'Mot de passe requis.'; return; }
    if (np !== nc) { document.getElementById('forgot-error').innerText = 'Les mots de passe ne correspondent pas.'; return; }
    const res = await api.post('/reset-password', { email: resetEmail, code: resetCode, newPass: np });
    if (!res.success) { document.getElementById('forgot-error').innerText = res.msg; return; }
    closeForgot();
    toast('Mot de passe modifié ! Reconnectez-vous.');
}

// ── AUTH ──────────────────────────────────────────────
async function handleAuth() {
    const email = document.getElementById('s-email').value.trim();
    const pass  = document.getElementById('s-pass').value.trim();
    const err   = document.getElementById('auth-error');
    if (!email || !pass) { err.innerText = 'Email et mot de passe requis.'; return; }
    err.innerText = authMode === 'login' ? 'Connexion...' : 'Création du compte...';
    try {
        const payload = { type: authMode, email, pass };
        if (authMode === 'signup') {
            payload.prenom = document.getElementById('s-prenom').value.trim();
            payload.nom    = document.getElementById('s-nom').value.trim();
            payload.pays   = document.getElementById('s-pays').value;
            if (!payload.prenom || !payload.nom) { err.innerText = 'Prénom et nom requis.'; return; }
        }
        const res = await api.post('/auth', payload);
        if (!res.success) { err.innerText = res.msg || 'Erreur.'; return; }
        currentUser = res.user;
        localStorage.setItem('msl_session', JSON.stringify({ email: currentUser.email, pass: currentUser.pass }));
        db = await api.get('/db');
        startApp();
    } catch(e) {
        err.innerText = '❌ Impossible de joindre le serveur. Réessayez.';
        console.error(e);
    }
}

// ── SETTINGS helpers ──────────────────────────────────
async function changeServer(url) {
    SERVER_URL = url;
    localStorage.setItem('msl_server_url', url);
    toast('URL mise à jour.');
}

// ── BOOT ─────────────────────────────────────────────
(async () => {
    // Auto-login
    const session = JSON.parse(localStorage.getItem('msl_session') || 'null');
    if (session) {
        try {
            db = await api.get('/db');
            if (db && db.users) {
                const u = db.users.find(x => x.email === session.email && x.pass === session.pass);
                if (u) { currentUser = u; startApp(); return; }
            }
        } catch(e) { console.log('Auto-login failed:', e.message); }
    }
    // Show auth screen directly
    document.getElementById('setup').style.display = 'flex';
})();

// ── APP START ─────────────────────────────────────────
function startApp() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').classList.add('ready');
    // Avatar
    const ini = ((currentUser.prenom||'')[0]||(currentUser.nom||'')[0]||'?').toUpperCase();
    document.getElementById('top-avatar').innerText = ini;
    // Settings
    const pays = document.getElementById('set-pays');
    if (pays) pays.value = currentUser.pays||'France';
    const lang = document.getElementById('set-lang');
    if (lang) lang.value = currentUser.langue||'fr';
    const ipEl = document.getElementById('set-ip');
    if (ipEl) ipEl.value = SERVER;
    // Theme
    const savedTheme = localStorage.getItem('msl_theme') || db.theme || 'default';
    applyTheme(savedTheme);
    buildThemeGrid();
    renderGames();
    startChatPolling();
}

// ── NAVIGATION ────────────────────────────────────────
function vw(id) {
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('v-'+id).classList.add('active');
    document.getElementById('nb-'+id).classList.add('active');
    if (id==='chat') loadChat();
    if (id==='lib') renderGames();
}

// ── GAMES ─────────────────────────────────────────────
function renderGames() {
    if (!db) return;
    const term = (document.getElementById('search')||{}).value?.toLowerCase()||'';
    let games = db.games.filter(g=>g.name.toLowerCase().includes(term));
    document.getElementById('lib-count').innerText = `${games.length} jeu${games.length>1?'x':''} dans la bibliothèque`;
    if (games.length===0) {
        document.getElementById('game-grid').innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="ico">🎮</div><p>Aucun jeu trouvé</p></div>';
        return;
    }
    document.getElementById('game-grid').innerHTML = games.map(g=>`
        <div class="game-card" onclick="openGame('${g.appid}')">
            <img src="${g.img}" alt="${g.name}" loading="lazy" onerror="this.style.height='80px';this.style.background='var(--bg3)'">
            <div class="game-card-body">
                <div class="game-card-name">${g.name}</div>
                <div class="game-card-meta">${g.developer||''}</div>
                ${g.pegi&&g.pegi!=='0'?`<span class="badge pegi">PEGI ${g.pegi}</span>`:''}
                ${g.avgRating?`<span class="badge">⭐${g.avgRating.toFixed(1)}</span>`:''}
            </div>
        </div>`).join('');
}

function filterGames() { renderGames(); }

// ── GAME MODAL ────────────────────────────────────────
async function openGame(appid) {
    const g = db.games.find(x=>x.appid===appid);
    if (!g) return;
    currentGameId = appid; selectedStar = 0;
    document.getElementById('gm-img').src = g.img;
    document.getElementById('gm-name').innerText = g.name;
    const fields = [
        ['Développeur',g.developer||'—'],['Éditeur',g.publisher||'—'],
        ['Date de sortie',g.releaseDate||'—'],['PEGI',g.pegi&&g.pegi!=='0'?g.pegi:'Tous'],
        ['Genres',(g.genres||[]).join(', ')||'—'],
        ['Note',g.avgRating?g.avgRating.toFixed(1)+'/5 ★':'—'],
    ];
    document.getElementById('gm-grid').innerHTML = fields.map(([l,v])=>`<div class="modal-field"><label>${l}</label><span>${v}</span></div>`).join('');
    document.getElementById('gm-desc').innerText = g.description||'';
    document.getElementById('gm-play').onclick = ()=>window.open(`steam://rungameid/${appid}`);
    // Stars
    buildStars();
    renderReviews(g);
    document.getElementById('game-modal').classList.add('active');
}

function buildStars() {
    const row = document.getElementById('stars-row');
    row.innerHTML = [1,2,3,4,5].map(i=>`<span class="star ${i<=selectedStar?'active':''}" onclick="setStar(${i})">★</span>`).join('');
}
function setStar(n) { selectedStar=n; buildStars(); }

function renderReviews(g) {
    const list = document.getElementById('reviews-list');
    const ratings = g.ratings||[];
    list.innerHTML = ratings.length===0
        ? '<p style="font-size:12px;color:var(--text3)">Aucun avis pour l\'instant.</p>'
        : ratings.slice().reverse().slice(0,8).map(r=>`
            <div style="padding:8px 10px;background:var(--bg2);border-radius:8px;margin-bottom:7px;border:1px solid var(--border)">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
                    <span style="font-size:12px;font-weight:600">${r.author}</span>
                    <span style="color:var(--gold);font-size:11px">${'★'.repeat(r.stars)}</span>
                </div>
                ${r.text?`<div style="font-size:12px;color:var(--text2)">${r.text}</div>`:''}
            </div>`).join('');
}

async function submitRating() {
    if (!selectedStar) { toast('Sélectionnez une note (1-5 ★)', 'error'); return; }
    const text = document.getElementById('review-text').value.trim();
    if (hasBad(text)) { toast('Contenu inapproprié détecté', 'error'); return; }
    const gIdx = db.games.findIndex(g=>g.appid===currentGameId);
    if (gIdx===-1) return;
    if (!db.games[gIdx].ratings) db.games[gIdx].ratings=[];
    const existing = db.games[gIdx].ratings.findIndex(r=>r.userId===currentUser.email);
    const entry = {userId:currentUser.email,author:currentUser.prenom+' '+currentUser.nom,stars:selectedStar,text,date:Date.now()};
    if (existing!==-1) db.games[gIdx].ratings[existing]=entry; else db.games[gIdx].ratings.push(entry);
    db.games[gIdx].avgRating = db.games[gIdx].ratings.reduce((s,r)=>s+r.stars,0)/db.games[gIdx].ratings.length;
    await api.post('/db', db);
    document.getElementById('review-text').value='';
    selectedStar=0; buildStars();
    renderReviews(db.games[gIdx]);
    toast('Avis ajouté !');
}

function closeModal() { document.getElementById('game-modal').classList.remove('active'); }

// ── CHAT ─────────────────────────────────────────────
async function loadChat() {
    const pays = (currentUser&&currentUser.pays)||'France';
    document.getElementById('chat-flag').innerText = FLAGS[pays]||'🌍';
    document.getElementById('chat-label').innerText = `Chat — ${pays}`;
    const members = db.users.filter(u=>u.pays===pays).length;
    document.getElementById('chat-members').innerText = `${members} membre${members>1?'s':''} dans ce salon`;
    const msgs = await api.get(`/chat?pays=${encodeURIComponent(pays)}`);
    cachedMsgs[pays] = msgs;
    renderMsgs(msgs);
}

function renderMsgs(msgs) {
    const box = document.getElementById('chat-msgs');
    if (!msgs||msgs.length===0) { box.innerHTML='<p style="text-align:center;color:var(--text2);font-size:13px;padding:20px">Aucun message — soyez le premier !</p>'; return; }
    box.innerHTML = msgs.map(m=>{
        const isMe = m.userId===currentUser.id;
        return `<div class="chat-msg ${isMe?'me':''}">
            <div class="chat-av">${(m.prenom||'?')[0]}</div>
            <div>
                ${!isMe?`<div class="chat-author">${m.prenom} ${m.nom}</div>`:''}
                <div class="chat-bubble">${m.text}</div>
                <div class="chat-time">${new Date(m.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
            </div>
        </div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
}

async function sendMsg() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    if (hasBad(text)) { toast('Message refusé — contenu inapproprié', 'error'); return; }
    const pays = (currentUser&&currentUser.pays)||'France';
    const msg = {userId:currentUser.id, prenom:currentUser.prenom, nom:currentUser.nom, text, date:Date.now()};
    await api.post('/chat', {pays, msg});
    input.value='';
    const msgs = await api.get(`/chat?pays=${encodeURIComponent(pays)}`);
    cachedMsgs[pays]=msgs; renderMsgs(msgs);
}

function startChatPolling() {
    if (chatInterval) clearInterval(chatInterval);
    chatInterval = setInterval(async()=>{
        if (!document.getElementById('v-chat').classList.contains('active')) return;
        const pays = (currentUser&&currentUser.pays)||'France';
        const msgs = await api.get(`/chat?pays=${encodeURIComponent(pays)}`);
        const cached = cachedMsgs[pays]||[];
        if (msgs.length!==cached.length||(msgs.length>0&&msgs[msgs.length-1].date!==cached[cached.length-1]?.date)) {
            cachedMsgs[pays]=msgs; renderMsgs(msgs);
        }
    }, 3000);
}

// ── SETTINGS ─────────────────────────────────────────
async function saveSetting(key, val) {
    if (!currentUser) return;
    currentUser[key] = val;
    const idx = db.users.findIndex(u=>u.email===currentUser.email);
    if (idx!==-1) db.users[idx][key]=val;
    await api.post('/db', db);
    localStorage.setItem('msl_session', JSON.stringify({email:currentUser.email,pass:currentUser.pass}));
    if (key==='pays') { cachedMsgs={}; if (document.getElementById('v-chat').classList.contains('active')) loadChat(); }
    toast('Sauvegardé !');
}

async function changePassword() {
    const np = document.getElementById('new-pass').value.trim();
    if (!np) return;
    currentUser.pass = np;
    const idx = db.users.findIndex(u=>u.email===currentUser.email);
    if (idx!==-1) db.users[idx].pass=np;
    await api.post('/db', db);
    localStorage.setItem('msl_session', JSON.stringify({email:currentUser.email,pass:np}));
    document.getElementById('new-pass').value='';
    toast('Mot de passe mis à jour !');
}

async function changeServer(ip) {
    SERVER = ip;
    localStorage.setItem('msl_server', ip);
    toast('Adresse mise à jour. Rechargez l\'app.');
}

// ── THEME ─────────────────────────────────────────────
function applyTheme(key) {
    document.body.setAttribute('data-theme', key);
    localStorage.setItem('msl_theme', key);
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===key));
}

function buildThemeGrid() {
    const grid = document.getElementById('theme-grid');
    if (!grid) return;
    const cur = localStorage.getItem('msl_theme')||'default';
    grid.innerHTML = THEMES.map(t=>`
        <div class="theme-btn ${t.key===cur?'active':''}" data-theme="${t.key}" onclick="applyTheme('${t.key}')">
            <div class="theme-swatch" style="background:${t.bg}"></div>
            <div class="theme-label">${t.label}</div>
        </div>`).join('');
}

// ── ACCOUNT ──────────────────────────────────────────
async function logout() {
    if (!confirm('Se déconnecter ?')) return;
    await api.post('/offline', {email:currentUser.email}).catch(()=>{});
    localStorage.removeItem('msl_session');
    location.reload();
}

async function deleteAccount() {
    if (!confirm('Supprimer définitivement ton compte ? Irréversible.')) return;
    if (!confirm('Dernière confirmation.')) return;
    db.users = db.users.filter(u=>u.email!==currentUser.email);
    if (db.chat) Object.keys(db.chat).forEach(p=>{ db.chat[p]=(db.chat[p]||[]).filter(m=>m.userId!==currentUser.id); });
    await api.post('/db', db);
    localStorage.removeItem('msl_session');
    toast('Compte supprimé. Au revoir !');
    setTimeout(()=>location.reload(), 1500);
}

// ── SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
